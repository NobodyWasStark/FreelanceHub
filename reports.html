<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | SkillBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#FAFBFC] flex min-h-screen">
    <aside id="sidebar-container"></aside>
    <div class="flex-1 flex flex-col min-w-0">
        <header id="navbar-container"></header>
        <main class="flex-1 p-8 max-w-7xl mx-auto w-full space-y-8">
            <div class="space-y-1">
                <h1 class="text-4xl font-bold text-gray-900">Reports</h1>
                <p class="text-gray-500">Detailed overview of your freelance activity and financial health.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-8 rounded-[2rem] border border-gray-100 shadow-sm space-y-4">
                    <div class="flex justify-between items-start">
                        <div class="p-3 rounded-2xl bg-green-50 text-green-600"><i data-lucide="bar-chart-3" class="w-6 h-6"></i></div>
                        <span class="text-[10px] font-bold px-2 py-1 rounded-lg uppercase tracking-wider bg-green-50 text-green-600">+12.5%</span>
                    </div>
                    <div class="space-y-1">
                        <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Total Spent This Month</p>
                        <p class="text-4xl font-bold text-gray-900">$1,400</p>
                    </div>
                </div>
                <!-- ... other summary cards ... -->
            </div>
            <div class="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm">
                <h2 class="text-2xl font-bold text-gray-900 mb-6">Spending Over Time</h2>
                <div class="h-[300px] w-full"><canvas id="spendingChart"></canvas></div>
            </div>
        </main>
    </div>
    <script src="assets/js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ctx = document.getElementById('spendingChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN'],
                    datasets: [{
                        label: 'Spending',
                        data: [300, 350, 400, 380, 600, 450],
                        borderColor: '#16a34a',
                        borderWidth: 4,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(22, 163, 74, 0.1)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        });
    </script>
</body>
</html>
