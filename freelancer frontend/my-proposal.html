<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillBridge - My Proposals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdn.tailwindcss.com" defer></script>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="assets/css/freelancer.css" />
  <style>
    .proposal-tab {
      transition: all 0.2s ease;
    }
    .proposal-tab.active {
      background: #0f172a; /* slate-900 */
      color: white;
      border-color: #0f172a;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex">
  <div id="navbar-root"></div>

  <div class="flex-1 flex flex-col lg:ml-60 min-h-screen pt-[56px] lg:pt-0">
    <div id="header-root"></div>

    <main class="flex-1 px-4 sm:px-8 py-6 sm:py-8">
      <section class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4 mb-7">
        <div>
          <h1 class="font-jakarta text-[30px] sm:text-[36px] font-extrabold text-slate-900 leading-tight mb-1">My Proposals</h1>
          <p class="text-[14px] text-slate-500 leading-relaxed">Manage your active bids, submitted proposals, and invitations.</p>
        </div>
      </section>

      <!-- TABS -->
      <div class="flex flex-wrap gap-2 mb-8 border-b border-slate-200 pb-4">
        <button class="proposal-tab active px-5 py-2 text-sm font-bold rounded-full border border-slate-200 bg-white text-slate-500 hover:bg-slate-50 hover:text-slate-900" data-status="all">All Proposals</button>
        <button class="proposal-tab px-5 py-2 text-sm font-bold rounded-full border border-slate-200 bg-white text-slate-500 hover:bg-slate-50 hover:text-slate-900" data-status="active">Active (0)</button>
        <button class="proposal-tab px-5 py-2 text-sm font-bold rounded-full border border-slate-200 bg-white text-slate-500 hover:bg-slate-50 hover:text-slate-900" data-status="pending">Submitted (0)</button>
        <button class="proposal-tab px-5 py-2 text-sm font-bold rounded-full border border-slate-200 bg-white text-slate-500 hover:bg-slate-50 hover:text-slate-900" data-status="invitations" style="display:none;">Invitations (0)</button>
      </div>

      <div id="proposalsContainer" class="space-y-4">
        <p class="text-slate-500 text-center py-10">Loading proposals...</p>
      </div>

      <div id="footer-root"></div>
    </main>
  </div>

  <script src="assets/js/layout.js"></script>
  <script src="assets/js/my-proposal.js"></script>
</body>
</html>
