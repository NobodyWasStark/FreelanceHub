      <style>
        .sk { background: #e2e8f0; border-radius: 8px; animation: shimmer 1.4s infinite; }
        @keyframes shimmer {
          0%,100% { opacity: 1; } 50% { opacity: .45; }
        }
      </style>
      <!-- Banner skeleton -->
      <div style="background:#1e3a5f;height:120px;display:flex;align-items:flex-end;padding:16px 24px;gap:16px;">
        <div class="sk" style="width:80px;height:80px;border-radius:50%;border:4px solid white;flex-shrink:0;"></div>
        <div style="flex:1;padding-bottom:8px;">

          <div class="sk" style="width:60px;height:12px;background:#3b6ea8;"></div>
        </div>
      </div>

            <div class="sk" style="width:100%;height:10px;"></div>
