<body class="font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-4">
<main class="w-full max-w-lg flex flex-col items-center desktop-container">
<div class="w-full bg-surface-container-lowest p-10 md:p-14 shadow-[0_8px_32px_rgba(23,29,26,0.08)] rounded-xl flex flex-col gap-10">
<div class="flex flex-col items-center gap-6">
<div class="flex items-center gap-3">
<!-- <span class="material-symbols-outlined text-primary text-4xl" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span> -->
<img src="/icons/skillbridge.png" alt="" width="40" height="0">
<span class="font-headline font-extrabold text-3xl tracking-tight text-primary">SkillBridge</span>
</div>
<h1 class="font-headline font-bold text-3xl text-[#001e00] text-center">Log in to SkillBridge</h1>
</div>
<form class="flex flex-col gap-8" onsubmit="return false;">
<div class="flex flex-col gap-2.5">
<label class="font-label text-sm font-semibold text-on-surface-variant" for="email">Email or Username</label>
<input class="w-full bg-transparent border-b-2 border-surface-variant focus:border-primary focus:ring-0 transition-colors py-3 text-base outline-none placeholder:text-outline-variant/60" id="email" placeholder="Enter your email" type="text"/>
</div>
<div class="flex flex-col gap-2.5">
<div class="flex justify-between items-center">
<label class="font-label text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:opacity-80 transition-opacity" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-transparent border-b-2 border-surface-variant focus:border-primary focus:ring-0 transition-colors py-3 pr-10 text-base outline-none placeholder:text-outline-variant/60" id="password" placeholder="Enter password" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-2xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button onclick="handleLogin(event)" class="w-full py-4 bg-primary-container text-on-primary font-label font-bold text-base tracking-widest uppercase rounded-xl shadow-md hover:opacity-90 active:scale-[0.98] transition-all mt-2" type="submit">
                Log In
            </button>
</form>
<div class="relative flex items-center">
<div class="flex-grow border-t border-outline-variant opacity-25"></div>
<span class="flex-shrink mx-6 text-xs font-semibold text-on-surface-variant lowercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant opacity-25"></div>
</div>
<button class="w-full py-4 px-6 flex items-center justify-center gap-4 border-2 border-surface-variant hover:border-primary-container/30 hover:bg-surface-container-low transition-all rounded-xl">
<svg class="flex-shrink-0" height="22" viewbox="0 0 24 24" width="22">

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>

<span class="font-label font-semibold text-base text-on-surface">Continue with Google</span>
</button>
</div>
<p class="mt-10 text-base font-medium text-on-surface-variant">
        Don't have an account? 
        <a class="text-primary-container font-bold hover:underline ml-1.5" href="role-selection.html">Sign Up</a>

<footer class="mt-auto w-full py-10 bg-transparent">
<div class="max-w-7xl mx-auto flex flex-col items-center gap-6 px-6 text-center">
<div class="flex flex-wrap justify-center gap-10">
<a class="font-['Inter'] text-sm font-medium text-[#404944] hover:text-[#0a6e00] transition-colors" href="#">Privacy Policy</a>

<a class="font-['Inter'] text-sm font-medium text-[#404944] hover:text-[#0a6e00] transition-colors" href="#">Help Center</a>
</div>
<p class="font-['Inter'] text-sm text-[#404944] opacity-80">© 2024 SkillBridge Global. All rights reserved.</p>
</div>
</footer>
<script src="/scripts/api.js"></script>
<script>
  // Redirect if already logged in
  requireGuest();

  async function handleLogin(event) {
    event.preventDefault();
    const btn = event.submitter || document.querySelector('button[type="submit"]');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showToast('Please enter your email and password.', 'error');
      return;
    }

    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      const { user, token } = await Auth.login({ email, password });
      saveSession(user, token);
      showToast('Welcome back, ' + user.name + '!');
      setTimeout(() => redirectToDashboard(user.role), 800);
    } catch (err) {
      showToast(err.message || 'Login failed. Check your credentials.', 'error');
      btn.disabled = false;
      btn.textContent = originalText;
    }
  }
</script>
</body>
</html>
