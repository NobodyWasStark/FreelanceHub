<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillBridge – Alex Mitchell</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            jakarta: ['Plus Jakarta Sans', 'sans-serif'],
          },
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-slate-100 min-h-screen flex">

  <!--  MOBILE TOPBAR  -->
  <div class="md:hidden fixed top-0 left-0 right-0 z-40 bg-green-100 border-b border-slate-200 flex items-center gap-3 px-4 py-3">
    <button id="menuToggle" class="p-2 rounded-lg bg-green-50 text-green-700 border-none cursor-pointer shrink-0">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="flex items-center gap-2">
      <img src="/icons/skillbridge.png" alt="" width="24" height="20">
      <span class="font-jakarta text-[15px] font-extrabold text-green-900 tracking-tight">SkillBridge</span>
    </div>
  </div>

  <!--  SIDEBAR OVERLAY (mobile)  -->
  <div id="sidebarOverlay" class="md:hidden fixed inset-0 bg-black/40 z-30 hidden" onclick="closeSidebar()"></div>

  

  <!--  SIDEBAR  -->
  <aside id="sidebar" class="w-60 min-h-screen bg-green-100 border-r border-slate-200 flex flex-col fixed top-0 left-0 z-30 h-screen -translate-x-full md:translate-x-0 transition-transform duration-300">

    <!-- Brand -->
    <div class="flex items-center gap-2 px-5 py-5 border-b border-slate-100">
      <div class="w-7 h-7 rounded-lg  flex items-center justify-center">
         <img src="/icons/skillbridge.png" alt="" width="30" height="25">
      </div>
      <span class="font-jakarta text-[15px] font-extrabold text-green-900 tracking-tight">SkillBridge</span>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 px-2.5 py-3 flex flex-col gap-0.5 overflow-y-auto">
            <p class="text-[10px] font-semibold uppercase tracking-widest text-gray-400 px-3 mb-2 mt-1">Main Menu</p>
      <a href="#" class="flex items-center gap-2.5 px-3 py-2 rounded-[9px] text-[13px] text-slate-500 hover:bg-green-50 hover:text-green-700 transition-colors no-underline hover:border-l-4 border-solid border-green-900">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
        Dashboard
      </a>
        <a href="#" class="flex items-center gap-2.5 px-3 py-2 rounded-[9px] text-[13px] text-slate-500 hover:bg-green-50 hover:text-green-700 transition-colors no-underline hover:border-l-4 border-solid border-green-900">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          <span class="text-sm ">My Jobs</span>
        </div>
             <span class="ml-auto text-green-700 text-[10px] font-bold rounded-full px-1.5 py-px">4</span>
      </a>
      <a href="#" class="flex items-center gap-2.5 px-3 py-2 rounded-[9px] text-[13px] font-semibold text-green-700 bg-green-50 no-underline hover:border-l-4 border-solid border-green-900">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        My Profile
      </a>
            <a href="#" class="flex items-center justify-between px-3 py-2.5 rounded-lg text-gray-500 hover:bg-gray-50 hover:text-green-700 transition-colors hover:border-l-4 border-solid border-green-900">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="text-sm font-medium">Proposals</span>
        </div>
        <span class="text-xs bg-pink-100 text-pink-600 px-2 py-0.5 rounded-full font-semibold">18</span>
      </a>
      <a href="#" class="flex items-center gap-2.5 px-3 py-2 rounded-[9px] text-[13px] text-slate-500 hover:bg-green-50 hover:text-green-700 transition-colors no-underline hover:border-l-4 border-solid border-green-900">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Messages
        <span class="ml-auto bg-green-600 text-white text-[10px] font-bold rounded-full px-1.5 py-px">3</span>
      </a>

      <div class="px-3 pt-3 pb-1 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Account</div>

      <a href="#" class="flex items-center gap-2.5 px-3 py-2 rounded-[9px] text-[13px] text-slate-500 hover:bg-green-50 hover:text-green-700 transition-colors no-underline hover:border-l-4 border-solid border-green-900">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </a>
    </nav>

    <!-- Bottom: Help Center + Logout -->
    <div class="p-2.5 border-t border-slate-100 flex flex-col gap-0.5">
      <a href="#" class="flex items-center gap-2.5 px-3 py-2 rounded-[9px] text-[13px] text-slate-500 hover:bg-green-50 hover:text-green-700 transition-colors no-underline hover:border-l-4 border-solid border-green-900">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
        </svg>
        Help Center
      </a>
      <a href="#" class="flex items-center gap-2.5 px-3 py-2 rounded-[9px] text-[13px] text-red-500 hover:bg-red-50 transition-colors no-underline hover:border-l-4 border-solid border-green-900">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Log Out
      </a>
    </div>
  </aside>

  <!--MAIN WRAPPER-->
  <div class="ml-0 md:ml-[220px] flex-1 flex flex-col min-h-screen pt-[52px] md:pt-0">

    <!-- PAGE CONTENT  -->
    <main class="flex-1 px-4 sm:px-8 lg:px-10 py-7 sm:py-9">

      <!-- Title row -->
      <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4 mb-7">
        <div>
          <h1 class="font-jakarta text-[26px] sm:text-[28px] font-extrabold text-slate-900 leading-tight mb-1">Proposals</h1>
          <p class="text-[13px] text-slate-500 leading-relaxed max-w-md">
            Review and manage expert applications for your active project listings.
          </p>
        </div>
        <!-- Job selector -->
        <div class="shrink-0 flex flex-col gap-1">
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Select Job</label>
          <div class="relative">
            <select id="jobSelect"
              class="appearance-none bg-white border border-slate-200 rounded-xl text-[13px] font-semibold text-slate-700 pl-4 pr-9 py-2.5 outline-none cursor-pointer shadow-sm hover:border-green-400 transition-colors focus:border-green-500 focus:ring-2 focus:ring-green-100 w-full sm:w-64">
              <option value="ux">UI/UX Designer for Fintech App</option>
              <option value="brand">Brand Identity &amp; Style Guide</option>
              <option value="react">React Native Developer</option>
            </select>
            <div class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- ── PROPOSAL CARDS ── -->
      <div id="proposalList" class="flex flex-col gap-4"></div>

    </main>
  </div>

  <!-- 
       PROFILE MODAL
   -->
  <div id="profileModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" onclick="closeProfileModal(event)">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 z-10" onclick="event.stopPropagation()">
      <!-- Close -->
      <button onclick="closeProfileModal()" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center border-none cursor-pointer transition-colors">
        <svg width="14" height="14" fill="none" stroke="#64748b" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <!-- Content injected by JS -->
      <div id="profileModalContent"></div>
    </div>
  </div>

  <!--  MESSAGE MODAL  -->
  <div id="messageModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" onclick="closeMessageModal(event)">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 z-10" onclick="event.stopPropagation()">
      <button onclick="closeMessageModal()" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center border-none cursor-pointer transition-colors">
        <svg width="14" height="14" fill="none" stroke="#64748b" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div id="messageModalContent"></div>
    </div>
  </div>
</body>
</html>
