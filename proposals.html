<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposals | SkillBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#FAFBFC] flex min-h-screen">
    <aside id="sidebar-container"></aside>
    <div class="flex-1 flex flex-col min-w-0">
        <header id="navbar-container"></header>
        <main class="flex-1 p-10 max-w-6xl mx-auto w-full space-y-10">
            <div class="flex flex-col md:flex-row justify-between items-end gap-6">
                <div class="space-y-2">
                    <h1 class="text-5xl font-black text-gray-900">Proposals</h1>
                    <p class="text-gray-500 text-lg">Review and manage expert applications for your active listings.</p>
                </div>
                <div class="space-y-2 w-full md:w-auto">
                    <label class="text-[10px] font-black text-green-700 uppercase tracking-widest">Select Job</label>
                    <select class="w-full md:min-w-[320px] bg-white border border-gray-100 rounded-xl py-4 px-5 font-bold text-gray-900 shadow-sm outline-none cursor-pointer">
                        <option>UI/UX Designer for Fintech App</option>
                    </select>
                </div>
            </div>

            <div class="space-y-6">
                <!-- Proposal Card -->
                <div class="bg-white p-8 rounded-[2rem] border border-gray-100 shadow-sm flex flex-col md:flex-row gap-6">
                    <div class="shrink-0">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Julian" class="w-24 h-24 rounded-2xl border border-gray-100">
                    </div>
                    <div class="flex-1 space-y-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-2xl font-black text-gray-900">Julian Henderson</h3>
                                <div class="flex items-center gap-4 text-sm mt-1">
                                    <span class="text-yellow-500 font-bold flex items-center gap-1"><i data-lucide="star" class="w-4 h-4 fill-current"></i> 4.9</span>
                                    <span class="text-green-600 bg-green-50 px-2 py-0.5 rounded text-[10px] font-black uppercase">98% Job Success</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Proposed Bid</div>
                                <div class="text-3xl font-black text-gray-900">$1,200</div>
                            </div>
                        </div>
                        <p class="text-gray-500 leading-relaxed">I have over 8 years of experience designing complex financial interfaces...</p>
                        <div class="flex gap-4">
                            <button class="bg-green-700 text-white px-8 py-3 rounded-xl font-bold uppercase tracking-widest text-xs">Message</button>
                            <button class="border-2 border-gray-100 text-gray-900 px-8 py-3 rounded-xl font-bold uppercase tracking-widest text-xs">View Profile</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="assets/js/common.js"></script>
</body>
</html>
