<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details | SkillBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#FAFBFC] flex min-h-screen">
    <aside id="sidebar-container"></aside>
    <div class="flex-1 flex flex-col min-w-0">
        <header id="navbar-container"></header>
        <main class="flex-1 p-8 max-w-7xl mx-auto w-full flex flex-col lg:flex-row gap-10">
            <div class="flex-1 space-y-10">
                <button onclick="history.back()" class="flex items-center gap-2 text-green-600 font-bold"><i data-lucide="chevron-left" class="w-5 h-5"></i> Back</button>
                <div class="space-y-6">
                    <h1 class="text-5xl font-black text-gray-900 leading-tight">Senior UI Designer for Fintech SaaS Redesign</h1>
                    <div class="flex items-center gap-4">
                        <span class="bg-gray-100 text-gray-500 px-4 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest">Posted 2 hours ago</span>
                    </div>
                </div>
                <div class="prose prose-lg text-gray-600 max-w-none space-y-6 leading-relaxed">
                    <h2 class="text-3xl font-bold text-gray-900">Project Scope</h2>
                    <p>TechFlow is seeking a highly skilled Senior UI Designer to spearhead the comprehensive redesign of our core Fintech SaaS dashboard...</p>
                </div>
            </div>
            <div class="w-full lg:w-96 space-y-6">
                <div class="bg-white rounded-[2.5rem] border border-gray-100 p-10 shadow-sm space-y-8 sticky top-28">
                    <div class="text-5xl font-black text-gray-900">$2,500</div>
                    <button class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-lg hover:bg-green-700 transition-all uppercase tracking-widest">Submit a Proposal</button>
                    <button class="w-full border-2 border-green-600 text-green-600 py-5 rounded-2xl font-black text-lg hover:bg-green-50 transition-all uppercase tracking-widest">Save Job</button>
                </div>
            </div>
        </main>
    </div>
    <script src="assets/js/common.js"></script>
</body>
</html>
