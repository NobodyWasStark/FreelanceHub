<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillBridge – Messages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: #f6faf6; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 99px; }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 99px; }
    .chat-item { border-left: 3px solid transparent; transition: background .15s, border-color .15s; }
    .chat-item.active { background: #f0fdf4; border-left-color: #15803d; }
    .bubble-in { animation: bubbleIn .2s cubic-bezier(.34,1.5,.64,1) both; }
    @keyframes bubbleIn { from { opacity:0; transform:scale(.88) translateY(6px);} to { opacity:1; transform:none;} }
    #mobile-overlay { display:none; }
    @media (max-width:1023px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #mobile-overlay.show { display:block; }
    }
    /* Desktop profile panel */
    #profile-panel { transition: width .28s cubic-bezier(.4,0,.2,1), opacity .28s; overflow: hidden; }
    #profile-panel.panel-closed { width: 0; opacity: 0; pointer-events: none; }
    #profile-panel.panel-open { width: 20rem; opacity: 1; pointer-events: all; }
    /* Dropdown */
    #three-dot-menu { transform-origin: top right; transition: transform .15s, opacity .15s; }
    #three-dot-menu.dd-open { transform: scale(1); opacity:1; pointer-events:all; }
    #three-dot-menu.dd-closed { transform: scale(.92); opacity:0; pointer-events:none; }
    /* Mobile profile modal */
    #profile-modal { transition: opacity .25s; }
    #profile-modal.modal-hidden { opacity:0; pointer-events:none; display:none; }
    #profile-modal.modal-visible { opacity:1; pointer-events:all; display:flex; }
    #profile-modal-inner { transition: transform .28s cubic-bezier(.4,0,.2,1); }
    #profile-modal.modal-hidden #profile-modal-inner { transform: translateY(100%); }
    #profile-modal.modal-visible #profile-modal-inner { transform: translateY(0); }
  </style>
</head>
<body class="min-h-screen flex overflow-hidden">
<!-- Sidebar mobile overlay -->
<div id="mobile-overlay" class="fixed inset-0 bg-black/30 z-20 lg:hidden" onclick="closeSidebar()"></div>
<!-- SIDEBAR -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-60 bg-green-100 border-r border-gray-100 flex flex-col z-30 transition-transform duration-300 ease-in-out shrink-0 lg:translate-x-0">
  <div class="flex items-center gap-2 px-5 py-5 border-b border-slate-100">
    <img src="/icons/skillbridge.png" alt="" width="30" height="25">
    <span class="text-[20px] font-extrabold text-green-900 tracking-tight">SkillBridge</span>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto scrollbar-thin">
    <p class="text-[10px] font-semibold uppercase tracking-widest text-gray-400 px-3 mb-2 mt-1">Main Menu</p>
    <a href="./skillbridge-dashboard.html" class="flex items-center gap-2.5 px-3 py-2 rounded-[9px] text-slate-500 hover:bg-green-50 hover:text-green-700 transition-colors no-underline hover:border-l-4 border-solid border-green-900">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span class="text-sm font-medium">Dashboard</span>
    </a>
    <a href="./skillbridge-post.html" class="flex items-center justify-between px-3 py-2.5 rounded-lg text-gray-500 hover:bg-green-50 hover:text-green-700 transition-colors hover:border-l-4 border-solid border-green-900">
      <div class="flex items-center gap-3">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        <span class="text-sm font-medium">My Jobs</span>
      </div>
      <span class="bg-cyan-600 text-white text-[10px] font-bold rounded-full px-1.5 py-px">4</span>
    </a>
    <a href="./skillbridge-profile.html" class="flex items-center gap-2.5 px-3 py-2 rounded-[9px] text-gray-500 hover:bg-green-50 hover:text-green-700 transition-colors no-underline hover:border-l-4 border-solid border-green-900">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span class="text-sm font-medium">My Profile</span>
    </a>
    <a href="#" class="flex items-center justify-between px-3 py-2.5 rounded-lg text-gray-500 hover:bg-green-50 hover:text-green-700 transition-colors hover:border-l-4 border-solid border-green-900">
      <div class="flex items-center gap-3">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="text-sm font-medium">Proposals</span>
      </div>
      <span class="text-xs bg-pink-100 text-pink-600 px-2 py-0.5 rounded-full font-semibold">18</span>
    </a>
    <a href="./skillbridge-message.html" class="flex items-center justify-between px-3 py-2.5 rounded-lg bg-green-50 text-green-700 shadow-sm">
      <div class="flex items-center gap-3">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="text-sm font-semibold">Messages</span>
      </div>
      <span class="bg-green-600 text-white text-[10px] font-bold rounded-full px-1.5 py-px">3</span>
    </a>
    <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-500 hover:bg-gray-50 hover:text-green-700 transition-colors hover:border-l-4 border-solid border-green-900">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="text-sm font-medium">Reports</span>
    </a>
    <div class="px-3 pt-3 pb-1 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Account</div>
    <a href="./skillbridge-settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-500 hover:bg-gray-50 hover:text-green-700 transition-colors hover:border-l-4 border-solid border-green-900">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="text-sm font-medium">Settings</span>
    </a>
  </nav>
  <div class="px-3 pb-4 border-t border-gray-100 pt-3 space-y-0.5">
    <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-500 hover:bg-gray-50 hover:text-green-700 transition-colors hover:border-l-4 border-solid border-green-900">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span class="text-sm font-medium">Help Center</span>
    </a>
    <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-red-500 hover:bg-red-50 hover:text-red-600 transition-colors hover:border-l-4 border-solid border-red-400">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="text-sm font-medium">Log Out</span>
    </a>
  </div>
</aside>

<!-- MAIN -->
<div class="flex-1 flex flex-col lg:ml-60 min-h-screen overflow-hidden">

  <!-- Header -->
  <header class="sticky top-0 z-10 bg-white/90 backdrop-blur border-b border-gray-100 flex items-center gap-4 px-4 lg:px-6 py-3.5 shrink-0">
    <button onclick="openSidebar()" class="lg:hidden p-1.5 rounded-lg hover:bg-green-50 text-gray-500">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="relative flex-1 max-w-md">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="Search for freelancers or services..." class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-200 focus:border-green-400 transition"/>
    </div>
  </header>
  <!-- Body -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Chat List -->
    <div id="chat-list-panel" class="w-full sm:w-80 lg:w-72 xl:w-80 bg-white border-r border-gray-100 flex flex-col shrink-0">
      <div class="px-5 pt-5 pb-3 shrink-0">
        <h1 class="text-xl font-bold text-gray-900 mb-3">Messages</h1>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="chat-search" type="text" placeholder="Search chats" class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-200 focus:border-green-400 transition"/>
        </div>
      </div>
      <div id="chat-list" class="flex-1 overflow-y-auto scrollbar-thin px-2 pb-3 space-y-0.5"></div>
    </div>
     <!-- Right: empty state / chat area / profile panel -->
    <div class="flex flex-1 overflow-hidden">

      <!-- EMPTY STATE — shown on load, hidden after selecting a chat -->
      <div id="empty-state" class="flex flex-1 flex-col items-center justify-center text-center px-8 bg-gray-50">
        <div class="w-16 h-16 rounded-2xl bg-green-100 flex items-center justify-center mb-4">
          <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <p class="text-gray-700 font-semibold text-base">Select a conversation</p>
        <p class="text-gray-400 text-sm mt-1">Choose a chat from the list to start messaging</p>
      </div>

      <!-- CHAT AREA — hidden until a chat is selected -->
      <div id="chat-area" class="hidden flex-1 flex-col bg-gray-50 overflow-hidden">

        <!-- Chat Header -->
        <div class="bg-white border-b border-gray-100 px-4 sm:px-5 py-3.5 flex items-center gap-3 shrink-0">
          <button onclick="showChatList()" class="sm:hidden p-1.5 rounded-lg hover:bg-gray-100 text-gray-500 mr-1">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <div class="relative shrink-0">
            <img id="hdr-avatar" src="" alt="" class="w-10 h-10 rounded-full object-cover hidden"/>
            <div id="hdr-initials" class="w-10 h-10 rounded-full font-bold text-sm flex items-center justify-center hidden"></div>
            <span id="hdr-dot" class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-white rounded-full hidden"></span>
          </div>
          <div class="flex-1 min-w-0">
            <p id="hdr-name" class="font-semibold text-gray-900 text-sm truncate"></p>
            <p id="hdr-status" class="text-xs font-medium"></p>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <!-- View Profile button -->
            <button onclick="openProfile()" class="hidden sm:flex items-center gap-1.5 text-xs font-semibold text-gray-600 border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-gray-50 hover:border-gray-300 transition">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              View Profile
            </button>
            <!-- Three-dot -->
            <div class="relative">
              <button id="three-dot-btn" onclick="toggleDropdown(event)" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-500 transition">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                  <circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/>
                </svg>
              </button>
              <div id="three-dot-menu" class="dd-closed absolute right-0 top-full mt-1.5 w-52 bg-white border border-gray-100 rounded-xl shadow-xl z-50 py-1.5 overflow-hidden">
                <button onclick="dropdownAction('profile')" class="w-full flex items-center gap-2.5 px-4 py-2.5 text-sm text-gray-700 hover:bg-green-50 hover:text-green-700 transition-colors text-left">
                  <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                  View Profile
                </button>
                <button onclick="dropdownAction('unread')" class="w-full flex items-center gap-2.5 px-4 py-2.5 text-sm text-gray-700 hover:bg-green-50 hover:text-green-700 transition-colors text-left">
                  <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                  Mark as Unread
                </button>
                <button onclick="dropdownAction('archive')" class="w-full flex items-center gap-2.5 px-4 py-2.5 text-sm text-gray-700 hover:bg-green-50 hover:text-green-700 transition-colors text-left">
                  <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5" rx="1"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
                  Archive Chat
                </button>
                <div class="border-t border-gray-100 my-1"></div>
                <button onclick="dropdownAction('delete')" class="w-full flex items-center gap-2.5 px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 transition-colors text-left">
                  <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                  Delete Conversation
                </button>
              </div>
            </div>
          </div>
        </div>

                <!-- Messages -->
        <div id="chat-messages" class="flex-1 overflow-y-auto px-4 sm:px-8 py-6 space-y-3"></div>

        <!-- Input bar -->
        <div class="bg-white border-t border-gray-100 px-4 py-3 shrink-0">
          <div class="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-2xl px-3 py-2 focus-within:ring-2 focus-within:ring-green-200 focus-within:border-green-400 transition">
            <button class="shrink-0 p-1 text-gray-400 hover:text-green-600 transition">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <input id="msg-input" type="text" placeholder="Write a message..." class="flex-1 bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none min-w-0"/>
            <button class="shrink-0 p-1 text-gray-400 hover:text-yellow-500 transition">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </button>
            <button id="send-btn" class="shrink-0 bg-green-700 hover:bg-green-800 active:scale-95 transition text-white rounded-xl p-2">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- DESKTOP PROFILE PANEL -->
      <div id="profile-panel" class="panel-closed flex-col bg-white border-l border-gray-100 overflow-y-auto scrollbar-thin shrink-0 hidden lg:flex">
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 shrink-0">
          <h2 class="font-semibold text-gray-900 text-sm">Freelancer Profile</h2>
          <button onclick="closeProfile()" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 transition">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="profile-panel-body" class="px-5 py-5"></div>
      </div>
    </div>
  </div>
</div>

<!-- MOBILE PROFILE MODAL -->
<div id="profile-modal" class="modal-hidden fixed inset-0 z-50 items-end lg:hidden">
  <div class="absolute inset-0 bg-black/40" onclick="closeProfile()"></div>
  <div id="profile-modal-inner" class="relative w-full bg-white rounded-t-2xl max-h-[85vh] overflow-y-auto scrollbar-thin z-10">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 sticky top-0 bg-white z-10">
      <h2 class="font-semibold text-gray-900">Freelancer Profile</h2>
      <button onclick="closeProfile()" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 transition">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="profile-modal-body" class="px-5 py-5"></div>
  </div>
</div>

<script src="/scripts/message.js"></script>
</body>
</html>
